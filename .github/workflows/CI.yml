name: CI

on:
  workflow_dispatch:  # adds a manual "Run workflow" button
  push:
    branches: [ Dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install ruff
      - run: ruff check .   # or flake8
