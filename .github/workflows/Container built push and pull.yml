name: Build, push and deploy

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to build and deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - frontend
          - backend
          - pipeline
          - inference

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ github.event.inputs.service == 'all' && fromJson('["backend","pipeline","inference","frontend"]') || fromJson(format('["{0}"]', github.event.inputs.service)) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Map service to folder
        id: ctx
        run: |
          case "${{ matrix.service }}" in
            frontend) echo "path=electron-app" >> $GITHUB_OUTPUT ;;
            *) echo "path=${{ matrix.service }}" >> $GITHUB_OUTPUT ;;
          esac

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.ctx.outputs.path }}
          push: true
          tags: playsmartbuas/bg-app-${{ matrix.service }}:latest

